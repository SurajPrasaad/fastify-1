# coturn production configuration
# Compatible with HMAC-SHA1 ephemeral credentials issued by the backend

listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# Authentication
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=${COTURN_STATIC_AUTH_SECRET}
realm=turn.platform.com

# Quotas & Limits
total-quota=1000
bps-capacity=0
max-bps=2000000
stale-nonce=600

# Security
no-multicast-peers
no-cli
no-tcp-relay

# Deny private IP ranges (prevent SSRF)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# TLS (mount certs via K8s secret volume)
cert=/etc/turn/certs/turn.pem
pkey=/etc/turn/certs/turn.key
cipher-list="ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256"

# Metrics
prometheus
