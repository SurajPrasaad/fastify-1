version: "3.9"

services:
  app:
    build: .
    container_name: fastify-app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongo
      - postgres
      - rabbitmq
      - kafka
    environment:
      NODE_ENV: production
      PORT: 8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGO_URL: mongodb://mongo:27017/mydb
      DATABASE_URL: postgres://postgres:postgres@pgbouncer:6432/fastify_app
      RABBITMQ_URL: amqp://rabbitmq:5672
      KAFKA_BROKERS: kafka:29092
      REGION: us-east
      COTURN_STATIC_AUTH_SECRET: dev-turn-secret-12345
      TURN_DOMAIN_US: coturn

  redis:
    image: redis:7-alpine
    container_name: redis-server
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastify_app
    ports:
      - "5432:5432"
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c effective_cache_size=768MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastify_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: db-backup
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=fastify_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=6
      - HEALTHCHECK_PORT=8080
    volumes:
      - ./backups/postgres:/backups
    depends_on:
      - postgres


  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/fastify_app
      PGBOUNCER_LISTEN_PORT: 6432
      PGBOUNCER_AUTH_TYPE: any
      PGBOUNCER_POOL_MODE: transaction
    depends_on:
      - postgres
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro


  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-server
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  coturn:
    image: coturn/coturn:latest
    container_name: coturn-server
    network_mode: host
    volumes:
      - coturn-data:/var/lib/coturn
    command:
      - -n
      - --listening-port=3478
      - --tls-listening-port=5349
      - --min-port=49152
      - --max-port=65535
      - --fingerprint
      - --lt-cred-mech
      - --use-auth-secret
      - --static-auth-secret=dev-turn-secret-12345
      - --realm=turn.platform.com
      - --total-quota=1000
      - --max-bps=2000000
      - --stale-nonce=600
      - --no-multicast-peers
      - --no-cli
      - --no-tcp-relay
      - --denied-peer-ip=10.0.0.0-10.255.255.255
      - --denied-peer-ip=172.16.0.0-172.31.255.255
      - --denied-peer-ip=192.168.0.0-192.168.255.255
      - --prometheus


volumes:
  redis-data:
  mongo-data:
  postgres-data:
  rabbitmq-data:
  coturn-data:

